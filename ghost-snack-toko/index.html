<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostSnack - Toko Jajanan Hantu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Creepster+2&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <div class="ghost-login animate-bounce">
                <div class="ghost-body"></div>
                <div class="ghost-eyes"></div>
                <div class="ghost-mouth"></div>
            </div>
            <h1 class="login-title">👻 GhostSnack</h1>
            <p class="login-subtitle">Masukkan Password Hantu</p>
            <input type="password" id="passwordInput" class="login-input" placeholder="Ketik 'hantu123'">
            <button id="loginBtn" class="login-btn">Masuk ke Dunia Hantu</button>
            <div class="error-message" id="errorMsg"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="app-container" style="display: none;">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1 class="logo">👻 <span>GhostSnack</span></h1>
            </div>
            <div class="header-right">
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav">
            <button class="nav-btn active" data-page="home">🏠 Home</button>
            <button class="nav-btn" data-page="products">📦 Produk</button>
            <button class="nav-btn" data-page="dashboard">📊 Dashboard</button>
        </nav>

        <!-- Pages -->
        <main class="main-content">
            <!-- Home Page -->
            <div id="homePage" class="page active">
                <div class="hero">
                    <div class="hero-ghost animate-float"></div>
                    <h2>Selamat Datang di GhostSnack!</h2>
                    <p>Toko jajanan paling spooky dengan kualitas hantu terbaik</p>
                    <div class="stats">
                        <div class="stat-card">
                            <h3>150+</h3>
                            <p>Produk</p>
                        </div>
                        <div class="stat-card">
                            <h3>500+</h3>
                            <p>Terjual</p>
                        </div>
                        <div class="stat-card">
                            <h3>100%</h3>
                            <p>Halal</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Products Page -->
            <div id="productsPage" class="page">
                <div class="page-header">
                    <h2>📦 Daftar Produk Hantu</h2>
                    <input type="text" id="searchInput" placeholder="Cari jajanan hantu...">
                </div>
                <div id="productsGrid" class="products-grid">
                    <!-- Products will be loaded here -->
                </div>
            </div>

            <!-- Dashboard Page -->
            <div id="dashboardPage" class="page">
                <div class="page-header">
                    <h2>📊 Dashboard Hantu</h2>
                </div>
                <div class="dashboard-grid">
                    <div class="chart-container">
                        <canvas id="salesChart"></canvas>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <h3 id="totalSales">Rp 0</h3>
                            <p>Total Penjualan</p>
                        </div>
                        <div class="stat-box">
                            <h3 id="totalProducts">0</h3>
                            <p>Total Produk</p>
                        </div>
                        <div class="stat-box">
                            <h3 id="halalProducts">0</h3>
                            <p>Produk Halal</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
